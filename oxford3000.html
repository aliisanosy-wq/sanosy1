<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حافظ كلمة | Vocab Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1929;
    --card: #231f3a;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --green: #06d6a0;
    --red: #ef476f;
    --text: #fffffe;
    --muted: #a7a3c2;
    --border: rgba(255,255,255,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(255,107,53,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(6,214,160,0.06) 0%, transparent 50%);
  }

  header {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .day-badge {
    background: rgba(255,107,53,0.15);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--accent);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
  }

  .progress-section {
    width: 100%;
    max-width: 600px;
    margin-bottom: 28px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Flashcard */
  .card-wrapper {
    width: 100%;
    max-width: 600px;
    perspective: 1200px;
    margin-bottom: 28px;
  }

  .card {
    width: 100%;
    min-height: 320px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    min-height: 320px;
    backface-visibility: hidden;
    border-radius: 20px;
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .card-front {
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }

  .card-back {
    background: linear-gradient(135deg, #1e1b3a 0%, #2a2048 100%);
    border: 1px solid rgba(255,209,102,0.2);
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    transform: rotateY(180deg);
  }

  .word-emoji { font-size: 52px; margin-bottom: 16px; }

  .word-english {
    font-family: 'Space Mono', monospace;
    font-size: 38px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .word-topic {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .tap-hint {
    position: absolute;
    bottom: 16px;
    font-size: 12px;
    color: rgba(167,163,194,0.5);
    font-family: 'Space Mono', monospace;
  }

  .word-arabic {
    font-size: 34px;
    font-weight: 900;
    color: var(--accent2);
    margin-bottom: 16px;
  }

  .word-example {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
    font-style: italic;
    max-width: 400px;
    direction: ltr;
    text-align: center;
  }

  .example-label {
    font-size: 11px;
    color: var(--green);
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: block;
  }

  /* Buttons */
  .action-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 600px;
    margin-bottom: 24px;
  }

  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .btn:active { transform: scale(0.96); }
  .btn-sub { font-size: 11px; font-weight: 400; opacity: 0.7; font-family: 'Space Mono', monospace; }

  .btn-knew {
    background: rgba(6,214,160,0.15);
    border: 1px solid rgba(6,214,160,0.4);
    color: var(--green);
  }
  .btn-knew:hover { background: rgba(6,214,160,0.25); }

  .btn-again {
    background: rgba(239,71,111,0.15);
    border: 1px solid rgba(239,71,111,0.3);
    color: var(--red);
  }
  .btn-again:hover { background: rgba(239,71,111,0.25); }

  /* Nav */
  .nav-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 600px;
    margin-bottom: 28px;
  }

  .btn-nav {
    flex: 1;
    padding: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-nav:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  /* Day words list */
  .words-list {
    width: 100%;
    max-width: 600px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .word-pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .word-pill.active {
    background: rgba(255,107,53,0.15);
    border-color: rgba(255,107,53,0.4);
    color: var(--accent);
  }

  .word-pill.known {
    background: rgba(6,214,160,0.1);
    border-color: rgba(6,214,160,0.3);
    color: var(--green);
  }

  /* Session complete */
  .done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    width: 100%; max-width: 600px;
  }

  .done-screen.visible { display: flex; }

  .done-emoji { font-size: 72px; margin-bottom: 20px; animation: bounce 1s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }

  .done-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
  .done-sub { color: var(--muted); font-size: 15px; margin-bottom: 32px; line-height: 1.6; }

  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    width: 100%;
  }

  .stat-box {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 12px;
    text-align: center;
  }

  .stat-num { font-size: 32px; font-weight: 900; font-family: 'Space Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .btn-restart {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #ff9a3c);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-restart:hover { opacity: 0.9; }

  /* Day selector */
  .day-selector {
    width: 100%; max-width: 600px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .day-label { color: var(--muted); font-size: 13px; white-space: nowrap; }

  .day-select {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  .total-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }

  .card-number {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">VOCAB</div>
  <div class="day-badge" id="dayBadge">اليوم 1</div>
</header>

<div class="day-selector">
  <span class="day-label">اختر اليوم:</span>
  <select class="day-select" id="daySelect" onchange="loadDay(this.value)"></select>
</div>

<!-- Main training area -->
<div id="mainArea">
  <div class="progress-section">
    <div class="progress-label">
      <span id="progressText">الكلمة 1 من 5</span>
      <span id="knownCount">✓ 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="words-list" id="wordPills"></div>

  <div class="card-wrapper">
    <div class="card" id="flashcard" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="word-emoji" id="cardEmoji">😊</div>
        <div class="card-number" id="cardNumber">1 / 5</div>
        <div class="word-english" id="cardEnglish">happy</div>
        <div class="word-topic" id="cardTopic">FEELINGS</div>
        <div class="tap-hint">اضغط لترى المعنى</div>
      </div>
      <div class="card-face card-back">
        <div class="word-arabic" id="cardArabic">سعيد</div>
        <span class="example-label">مثال</span>
        <div class="word-example" id="cardExample">She looked happy today.</div>
      </div>
    </div>
  </div>

  <div class="action-row" id="actionRow">
    <button class="btn btn-again" onclick="markAgain()">
      ✗ مش عارفها
      <span class="btn-sub">again</span>
    </button>
    <button class="btn btn-knew" onclick="markKnew()">
      ✓ عارفها
      <span class="btn-sub">got it!</span>
    </button>
  </div>

  <div class="nav-row">
    <button class="btn-nav" onclick="prevWord()">→ السابقة</button>
    <button class="btn-nav" onclick="nextWord()">التالية ←</button>
  </div>

  <div class="total-badge" id="totalBadge"></div>
</div>

<!-- Done screen -->
<div class="done-screen" id="doneScreen">
  <div class="done-emoji">🎉</div>
  <div class="done-title">أنهيت اليوم!</div>
  <div class="done-sub">كملت الكلمات الخمسة لهذا اليوم.<br>كمّل كل يوم وهتحفظ الـ 1291 كلمة!</div>
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" style="color:var(--green)" id="statKnew">0</div>
      <div class="stat-label">عرفتها</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" style="color:var(--accent2)" id="statTotal">5</div>
      <div class="stat-label">إجمالي اليوم</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" style="color:var(--accent)" id="statDayNum">1</div>
      <div class="stat-label">رقم اليوم</div>
    </div>
  </div>
  <button class="btn-restart" onclick="nextDay()">اليوم التالي ←</button>
</div>

// =============================================
// APP LOGIC
// =============================================

const WORDS_PER_DAY = 5;
const totalDays = Math.ceil(allWords.length / WORDS_PER_DAY);

let currentDay = 1;
let dayWords = [];
let currentIndex = 0;
let knownSet = new Set();
let isFlipped = false;

function getStorageKey(day) { return `vocab_day_${day}`; }

async function loadKnownFromStorage(day) {
  try {
    const res = await window.storage.get(getStorageKey(day));
    if (res && res.value) return new Set(JSON.parse(res.value));
  } catch(e) {}
  return new Set();
}

async function saveKnown(day, known) {
  try {
    await window.storage.set(getStorageKey(day), JSON.stringify([...known]));
  } catch(e) {}
}

async function loadDay(day) {
  currentDay = parseInt(day);
  const start = (currentDay - 1) * WORDS_PER_DAY;
  dayWords = allWords.slice(start, start + WORDS_PER_DAY);
  currentIndex = 0;
  knownSet = await loadKnownFromStorage(currentDay);
  isFlipped = false;

  document.getElementById('dayBadge').textContent = `اليوم ${currentDay}`;
  document.getElementById('daySelect').value = currentDay;
  document.getElementById('statDayNum').textContent = currentDay;
  document.getElementById('statTotal').textContent = dayWords.length;

  // Check if day complete
  if (knownSet.size >= dayWords.length) {
    showDoneScreen();
    return;
  }

  // Find first unlearned
  while (currentIndex < dayWords.length && knownSet.has(currentIndex)) {
    currentIndex++;
  }
  if (currentIndex >= dayWords.length) currentIndex = 0;

  document.getElementById('mainArea').style.display = 'block';
  document.getElementById('doneScreen').classList.remove('visible');

  renderCard();
  renderPills();
  updateProgress();
}

function renderCard() {
  if (!dayWords[currentIndex]) return;
  const w = dayWords[currentIndex];
  isFlipped = false;
  const card = document.getElementById('flashcard');
  card.classList.remove('flipped');

  document.getElementById('cardEmoji').textContent = w.em;
  document.getElementById('cardEnglish').textContent = w.e;
  document.getElementById('cardTopic').textContent = w.t.toUpperCase();
  document.getElementById('cardArabic').textContent = w.a;
  document.getElementById('cardExample').textContent = w.ex;
  document.getElementById('cardNumber').textContent = `${currentIndex + 1} / ${dayWords.length}`;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
}

function renderPills() {
  const pills = document.getElementById('wordPills');
  pills.innerHTML = '';
  dayWords.forEach((w, i) => {
    const d = document.createElement('div');
    d.className = 'word-pill' + (i === currentIndex ? ' active' : '') + (knownSet.has(i) ? ' known' : '');
    d.textContent = w.e;
    d.onclick = () => { currentIndex = i; isFlipped = false; renderCard(); renderPills(); };
    pills.appendChild(d);
  });
}

function updateProgress() {
  const pct = (knownSet.size / dayWords.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `الكلمة ${currentIndex + 1} من ${dayWords.length}`;
  document.getElementById('knownCount').textContent = `✓ ${knownSet.size}`;
  document.getElementById('totalBadge').textContent = `إجمالي الكلمات: ${allWords.length} | يوم ${currentDay} من ${totalDays}`;
}

async function markKnew() {
  knownSet.add(currentIndex);
  await saveKnown(currentDay, knownSet);
  updateProgress();

  if (knownSet.size >= dayWords.length) {
    showDoneScreen();
    return;
  }
  nextWord();
}

async function markAgain() {
  knownSet.delete(currentIndex);
  await saveKnown(currentDay, knownSet);
  updateProgress();
  nextWord();
}

function nextWord() {
  let next = (currentIndex + 1) % dayWords.length;
  let tries = 0;
  while (knownSet.has(next) && tries < dayWords.length) {
    next = (next + 1) % dayWords.length;
    tries++;
  }
  currentIndex = next;
  isFlipped = false;
  renderCard();
  renderPills();
  updateProgress();
}

function prevWord() {
  currentIndex = (currentIndex - 1 + dayWords.length) % dayWords.length;
  isFlipped = false;
  renderCard();
  renderPills();
  updateProgress();
}

function showDoneScreen() {
  document.getElementById('mainArea').style.display = 'none';
  const done = document.getElementById('doneScreen');
  done.classList.add('visible');
  document.getElementById('statKnew').textContent = knownSet.size;
  document.getElementById('statTotal').textContent = dayWords.length;
  document.getElementById('statDayNum').textContent = currentDay;
}

function nextDay() {
  const next = Math.min(currentDay + 1, totalDays);
  document.getElementById('daySelect').value = next;
  loadDay(next);
}

// Build day selector
function buildDaySelector() {
  const sel = document.getElementById('daySelect');
  for (let i = 1; i <= totalDays; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    const start = (i-1)*WORDS_PER_DAY;
    opt.textContent = `يوم ${i} — ${allWords[start]?.e || ''}`;
    sel.appendChild(opt);
  }
}

buildDaySelector();
loadDay(1);
</script>
